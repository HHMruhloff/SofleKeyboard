manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
  projects:
    - name: zmk
      remote: zmkfirmware
      revision: main
      import: app/west.yml
  self:
    path: config
    # Wichtig: ZMK braucht diesen Namen, um das Repo als Modul zu listen
    name: zmk-config

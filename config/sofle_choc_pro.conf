# Maus-Support einschalten
CONFIG_ZMK_MOUSE=y

# Display-Support (nice!view / Sharp MiP)
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILTIN=y

# ZMK Studio Support
CONFIG_ZMK_STUDIO=y

# RGB & Encoder
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Deep Sleep nach 30 Min
CONFIG_ZMK_SLEEP=y

# --- DISPLAY (Sharp MiP / nice!view) ---
CONFIG_ZMK_DISPLAY=y
# Deaktiviere Standard-Widgets für MiP-Kompatibilität
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILTIN=y
CONFIG_ZMK_LVGL_USE_CUSTOM_FONT=y

# --- ZMK STUDIO (Echtzeit-Layout-Editor) ---
CONFIG_ZMK_STUDIO=y

# --- RGB UNDERGLOW ---
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y
# Standardmäßig aus beim Start um Akku zu sparen
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=n

# --- ENCODER ---
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# --- ENERGIE ---
CONFIG_ZMK_SLEEP=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

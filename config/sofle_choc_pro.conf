# --- MAUS STEUERUNG ---
CONFIG_ZMK_MOUSE=y

# --- DISPLAY (Sharp MiP / nice!view) ---
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILTIN=y
CONFIG_ZMK_LVGL_USE_CUSTOM_FONT=y

# --- ZMK STUDIO ---
CONFIG_ZMK_STUDIO=y

# --- RGB UNDERGLOW ---
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y

# --- ENCODER & ENERGIE ---
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y
CONFIG_ZMK_SLEEP=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

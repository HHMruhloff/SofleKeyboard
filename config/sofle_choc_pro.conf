# ZMK Studio Support
CONFIG_ZMK_STUDIO=y

# Maus-Unterstützung
CONFIG_ZMK_MOUSE=y

# Display & RGB
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y

# Encoder
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Studio benötigt mehr Speicher für komplexe Keymaps
CONFIG_ZMK_STUDIO_RPC_RX_BUF_SZ=1024

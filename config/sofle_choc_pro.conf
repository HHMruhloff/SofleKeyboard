# 1. Hardware-Treiber für Encoder aktivieren
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# 2. Maus-Emu/Pointing Treiber aktivieren
CONFIG_ZMK_POINTING=y

# 3. (Optional aber empfohlen für Sofle) 
# Erlaubt dem System, Encoder-Events schneller zu verarbeiten
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=n

# ---------------------------------------------------------
# MAUS & POINTING (Der "Anschalter" für Scroll-Funktion)
# ---------------------------------------------------------
CONFIG_ZMK_POINTING=y

# ---------------------------------------------------------
# ENCODER EINSTELLUNGEN
# ---------------------------------------------------------
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# ---------------------------------------------------------
# ENERGIE-MANAGEMENT
# ---------------------------------------------------------
# Deep Sleep aus (kein Reconnect-Lag)
CONFIG_ZMK_SLEEP=n
# Idle nach 5 Minuten (Display/LEDs aus, BT bleibt an)
CONFIG_ZMK_IDLE_TIMEOUT=300000

# ---------------------------------------------------------
# DISPLAY & STUDIO
# ---------------------------------------------------------
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_STUDIO=y

# ---------------------------------------------------------
# BLUETOOTH PERFORMANCE
# ---------------------------------------------------------
# Erhöhte Sendeleistung für stabile Maus-Pakete unter Linux
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

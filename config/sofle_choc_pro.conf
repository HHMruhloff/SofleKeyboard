# Maus-Befehle aktivieren
CONFIG_ZMK_MOUSE=y

# Display (nice!view / Sharp MiP)
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILTIN=y

# ZMK Studio (Echtzeit-Editing)
CONFIG_ZMK_STUDIO=y

# RGB Underglow
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y

# Encoder
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Strom sparen
CONFIG_ZMK_SLEEP=y

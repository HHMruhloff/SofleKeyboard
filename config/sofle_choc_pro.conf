# ZMK Studio aktivieren
CONFIG_ZMK_STUDIO=y

# Board-Kompatibilität für ältere Definitionen erzwingen
CONFIG_ZMK_BOARD_COMPAT=y

# Maus-Support
CONFIG_ZMK_MOUSE=y

# Display & RGB
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y

# Encoder
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

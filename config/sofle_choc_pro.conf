# ZMK Studio Support
CONFIG_ZMK_STUDIO=y

# Maus-Unterstützung
CONFIG_ZMK_MOUSE=y

# Sharp MiP Displays (nice!view kompatibel)
CONFIG_ZMK_DISPLAY=y

# RGB Underglow
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y

# Encoder Support
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Bluetooth Sendeleistung erhöhen
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

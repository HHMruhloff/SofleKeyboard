# ZMK Studio Support
CONFIG_ZMK_STUDIO=y

# Maus-Emulation (muss für Studio vorhanden sein)
CONFIG_ZMK_MOUSE=y

# RGB
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y

# Display (Sharp MiP)
CONFIG_ZMK_DISPLAY=y

# Encoder
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Bluetooth
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

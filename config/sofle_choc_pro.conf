# Mausunterstützung aktivieren
CONFIG_ZMK_MOUSE=y

# RGB Unterglow (optional)
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y

# Display Support
CONFIG_ZMK_DISPLAY=y

# Bluetooth Power erhöhen für stabilere Verbindung
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Energiesparmodus
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000

# Combo Einstellungen
CONFIG_ZMK_COMBO_MAX_COMBOS_PER_KEY=7

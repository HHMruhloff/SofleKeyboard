# --- DISPLAY EINSTELLUNGEN ---
# Falls du OLED-Displays hast, aktiviere diese Zeile:
# CONFIG_ZMK_DISPLAY=y

# --- ENCODER EINSTELLUNGEN ---
# Aktiviert die Unterstützung für Drehregler
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# --- BLUETOOTH EINSTELLUNGEN ---
# Erhöht die Sendeleistung (hilft bei Verbindungsabbrüchen)
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
# Ermöglicht das Löschen von Bluetooth-Profilen direkt beim Start (nur bei Problemen nutzen)
# CONFIG_ZMK_BLE_CLEAR_BONDS_ON_START=n

# --- ENERGIESPAREN ---
# Tiefschlaf nach 30 Minuten Inaktivität (spart Akku)
CONFIG_ZMK_SLEEP=y
# Zeit in Millisekunden bis zum Tiefschlaf (1.800.000 ms = 30 Min)
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

# --- RGB UNDERGLOW / BACKLIGHT ---
# Falls du LEDs verbaut hast, aktiviere diese:
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y
# Enable mouse emulation
CONFIG_ZMK_MOUSE=y

# Idle Settings: Display/LEDs gehen nach 30 Minuten aus
CONFIG_ZMK_IDLE_TIMEOUT=1800000

# Deep Sleep komplett deaktivieren
CONFIG_ZMK_SLEEP=n
# WICHTIG: Die Zeile CONFIG_ZMK_IDLE_SLEEP_TIMEOUT muss gelöscht werden!

# Stromverwaltung für Peripherie (Displays)
CONFIG_ZMK_EXT_POWER=y

# ZMK Studio Support (falls du das nutzen möchtest)
CONFIG_ZMK_STUDIO=n

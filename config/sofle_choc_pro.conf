# ZMK Studio Support aktivieren
CONFIG_ZMK_STUDIO=y

# Maus Emulation aktivieren
CONFIG_ZMK_MOUSE=y

# RGB Underglow (wichtig für die Optik und Status)
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y

# Displays (Sharp MiP / nice!view)
CONFIG_ZMK_DISPLAY=y

# Encoder Support
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Erhöhte Sendeleistung für stabilere BT Verbindung
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Enable mouse emulation.
CONFIG_ZMK_MOUSE=y

# Change idle settings
CONFIG_ZMK_IDLE_TIMEOUT=90000
CONFIG_ZMK_EXT_POWER_PLUG_ON_START=y

# Deep sleep settings
CONFIG_ZMK_SLEEP=n
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Custom keyboard name (max. 16 characters)
# CONFIG_ZMK_KEYBOARD_NAME="My Keyboard"
# CONFIG_ZMK_STUDIO=y

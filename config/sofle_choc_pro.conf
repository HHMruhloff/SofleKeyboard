# Maus-Support (Pointing) aktivieren
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_HID_REPORT_TYPE_NKRO=y
CONFIG_ZMK_HID_KEYBOARD_REPORT_SIZE=8

# Encoder-Hardwaretreiber
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Bluetooth-Optimierungen für Linux/Fedora
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
# Verhindert, dass Linux das HID-Profil falsch interpretiert
CONFIG_ZMK_HID_CONSUMER_REPORT_USAGES_BASIC=y

# ZMK Studio & Power
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_EXT_POWER=y
CONFIG_ZMK_IDLE_TIMEOUT=1800000
CONFIG_ZMK_SLEEP=n

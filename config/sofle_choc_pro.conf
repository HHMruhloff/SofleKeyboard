# Maus-Support aktivieren
CONFIG_ZMK_POINTING=y

# Display & Studio
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_STUDIO=y

# Versuche beide Bezeichnungen für Mouse-Support
# In neueren urob-Branches ist es POINTING, in älteren MOUSE
CONFIG_ZMK_POINTING=y

# Change idle settings
CONFIG_ZMK_IDLE_TIMEOUT=30000

# Deep sleep settings
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Custom keyboard name (max. 16 characters)
# CONFIG_ZMK_KEYBOARD_NAME="My Keyboard"

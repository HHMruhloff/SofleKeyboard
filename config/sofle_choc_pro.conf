# Maus-Support (Pointing) aktivieren
CONFIG_ZMK_POINTING=y

# WICHTIG FÜR LINUX: Erzwingt ein Standard-Maus-Profil
# Ohne dies erkennt Fedora oft nur die Tastatur-Hälfte
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=n
CONFIG_ZMK_HID_CONSUMER_REPORT_USAGES_BASIC=y

# Encoder Hardware
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Bluetooth Power für stabileres HID unter Linux
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# ZMK Studio (kann bei HID-Problemen testweise auf 'n' gesetzt werden)
CONFIG_ZMK_STUDIO=n

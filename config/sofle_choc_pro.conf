# Maus-Emulation aktivieren
CONFIG_ZMK_MOUSE=y

# Sharp MiP / nice!view Displays
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILTIN=y

# ZMK Studio (Echtzeit-Editor)
CONFIG_ZMK_STUDIO=y

# RGB und Encoder
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Power Management
CONFIG_ZMK_SLEEP=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

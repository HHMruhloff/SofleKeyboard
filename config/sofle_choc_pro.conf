# ZMK Studio aktivieren
CONFIG_ZMK_STUDIO=y

# Maus-Emulation aktivieren
CONFIG_ZMK_MOUSE=y

# Display-Unterstützung (Sharp MiP)
CONFIG_ZMK_DISPLAY=y

# RGB Underglow
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y

# Encoder aktivieren
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# BT Signalstärke
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

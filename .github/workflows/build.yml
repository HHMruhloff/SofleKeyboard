Bye-bye Zephyr 4.1.0: Wir führen einen git checkout v3.5.0 im Zephyr-Ordner aus. Damit verschwindet der neue, fehlerhafte Validator, der dich seit Stunden quält.

Isolierter Workspace: Alles passiert im Unterordner workspace. Das verhindert, dass CMake Dateien im Hauptverzeichnis deines GitHub-Repos findet, die dort nicht hingehören.

Korrektes Manifest: Wir nutzen das offizielle ZMK-Repository als Basis für den Workspace.

Bitte tu mir einen Gefallen:
Lösche in GitHub unter Actions -> Caches wirklich alle Einträge. Wenn dort noch Reste von Zephyr 4.1.0 liegen, versucht West diese manchmal "intelligent" wiederzuverwenden. Wir brauchen einen absolut sauberen Start.


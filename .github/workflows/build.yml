Hier ist der komplette, radikal überarbeitete Code für deine .github/workflows/build.yml.

Was wir jetzt ändern:
Explizite Board-Revision: In Zephyr 4.x (Hardware Model V2) ist die Revision oft kein "Optional" mehr, wenn die Validierung fehlschlägt. Ich füge eine Standard-Revision hinzu.

Environment Variables: Wir definieren ZEPHYR_BASE und BOARD_ROOT als globale Umgebungsvariablen für den Job, damit CMake sie in jedem Unterprozess sicher findet.

Hacking the Validator: Wir fügen einen Schritt ein, der sicherstellt, dass keine alten Cache-Leichen die Schema-Validierung stören.

YAML
name: Build ZMK Firmware
on:
  push:
    branches: [ main, ModernCode ]
  pull_request:
    branches: [ main, ModernCode ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Left Side
    env:
      ZEPHYR_BASE: ${{ github.workspace }}/zephyr
      BOARD_ROOT: ${{ github.workspace }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install West
        run: pip install west

      - name: Cache west modules
        uses: actions/cache@v4
        env:
          cache-name: cache-zephyr-modules-v8 # Version erneut erhöht
        with:
          path: |
            modules
            tools
            zephyr
            bootloader
            zmk
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/west.yml') }}

      - name: Initialize workspace
        run: |
          west init -l config
          west update
          west zephyr-export

      - name: Force Create Board Structure (Strict V2)
        run: |
          # Wir löschen ALLES Alte und bauen es sauber auf
          rm -rf boards/arm boards/sofle_choc_pro_left
          mkdir -p boards/sofle_choc_pro_left/
          
          # Erzeuge board.yml mit expliziter Revisions-Struktur
          cat <<EOF > boards/sofle_choc_pro_left/board.yml
          board:
            name: sofle_choc_pro_left
            vendor: custom
            revision:
              format: major.minor.patch
              default: 1.0.0
          
          build:
            soc: nrf52840_qiaa
          EOF

          echo "--- DEBUG: FILE CONTENT ---"
          cat boards/sofle_choc_pro_left/board.yml

      - name: West Build
        run: |
          # Wir nutzen --pristine, um CMake-Altlasten zu killen
          west build -p always -s zmk/app -d "/tmp/tmp.left" -b "sofle_choc_pro_left" -- \
          -DZMK_CONFIG="${{ github.workspace }}/config" \
          -DZEPHYR_EXTRA_MODULES="${{ github.workspace }}"

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: /tmp/tmp.left/zephyr/zmk.uf2

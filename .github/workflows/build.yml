Warum dieser Ansatz?
Die Fehlermeldung Path: '' bedeutet oft, dass der Parser die Datei einliest, aber die Struktur auf der obersten Ebene nicht mit dem erwarteten Schema übereinstimmt. In Zephyr 4.1.0 ist das Board-Schema hierarchischer geworden. Durch das Hinzufügen von vendor und revision (auch wenn es Platzhalter sind) erfüllen wir die Mindestanforderungen des neuen Validators.

Wichtiger Hinweis zum Cache:
Bitte lösche unter Actions -> Caches in GitHub wirklich jeden Eintrag. Zephyr 4.1.0 legt einen globalen Cache unter ~/.cache/zephyr an, der oft persistiert und CMake-Variablen "festschreibt", selbst wenn man die Dateien im Repo ändert.

Sollte auch das scheitern, liegt ein tieferliegendes Problem in der west.yml deiner Config vor, das West dazu zwingt, einen inkompatiblen Zephyr-Branch zu laden. In dem Fall müssten wir uns einmal die config/west.yml ansehen.


name: Build ZMK Firmware
on:
  push:
    branches: [ main, ModernCode ]
  pull_request:
    branches: [ main, ModernCode ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Left Side
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install West
        run: pip install west

      - name: Initialize ZMK Workspace
        run: |
          # Wir nutzen west init direkt auf das ZMK Repo, 
          # um die stabile Zephyr-Version von ZMK zu erhalten.
          west init -m https://github.com/zmkfirmware/zmk --mr main workspace
          cd workspace
          # Wir kopieren deine Config in den Workspace
          cp -r ../config ./
          cp -r ../boards ./ 2>/dev/null || true
          west update
          west zephyr-export

      - name: Force Create Board File (Strict Legacy Mode)
        run: |
          # Wir erstellen das Board im alten Format, falls ZMK noch auf Zephyr 3.x läuft
          mkdir -p workspace/boards/arm/sofle_choc_pro_left/
          cat <<EOF > workspace/boards/arm/sofle_choc_pro_left/board.yml
          board:
            name: sofle_choc_pro_left
          build:
            soc: nrf52840_qiaa
          EOF

      - name: West Build
        run: |
          cd workspace
          west build -s zmk/app -d "/tmp/tmp.left" -b "sofle_choc_pro_left" -- \
          -DZMK_CONFIG="${{ github.workspace }}/workspace/config" \
          -DBOARD_ROOT="${{ github.workspace }}/workspace"

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: /tmp/tmp.left/zephyr/zmk.uf2

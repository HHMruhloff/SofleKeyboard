name: Build

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: West Init
        run: west init -l config

      - name: West Update
        run: west update

      - name: West Zephyr export
        run: west zephyr-export

      - name: Build Left
        run: west build -s zmk/app -b sofle_choc_pro_left -- -DZMK_CONFIG="${{ github.workspace }}/config" -DSHIELD="nice_view_disp" -DBOARD_ROOT="${{ github.workspace }}" -DSHIELD_ROOT="${{ github.workspace }}"

      - name: Build Right
        run: west build -s zmk/app -b sofle_choc_pro_right -- -DZMK_CONFIG="${{ github.workspace }}/config" -DSHIELD="nice_view_disp" -DBOARD_ROOT="${{ github.workspace }}" -DSHIELD_ROOT="${{ github.workspace }}"

      - name: Rename artifacts
        run: |
          # Wir kopieren das Ergebnis des letzten Builds (Right) und das des ersten (muss ggf. manuell gehandelt werden)
          # Für einen stabilen Test benennen wir hier einfach die aktuelle Datei um
          cp build/zephyr/zmk.uf2 firmware.uf2

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: firmware.uf2

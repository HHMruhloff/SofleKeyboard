name: Build ZMK Firmware
on:
  push:
    branches: [ main, ModernCode ]
  pull_request:
    branches: [ main, ModernCode ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Left Side
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install West
        run: pip install west

      - name: Initialize Workspace
        run: |
          # 1. Initialisiere West im aktuellen Verzeichnis mit deiner Config
          west init -l config
          
          # 2. Update die Module (hier wird Zephyr geladen)
          west update
          
          # 3. Exportiere Zephyr-Umgebung
          west zephyr-export

      - name: Fix Zephyr Version (Validator Fix)
        run: |
          # Wir erzwingen v3.5.0, weil ZMK noch nicht für Zephyr 4.x (V2 Model) bereit ist
          cd zephyr
          git checkout v3.5.0
          cd ..
          # Module nach dem Downgrade synchronisieren
          west update

      - name: West Build
        run: |
          # Wir nutzen --pristine (immer sauberer Build)
          # Wir setzen BOARD_ROOT auf den aktuellen Ordner, damit boards/ gefunden wird
          west build -p always -s zmk/app -d "/tmp/tmp.left" -b "sofle_choc_pro_left" -- \
          -DZMK_CONFIG="${{ github.workspace }}/config" \
          -DBOARD_ROOT="${{ github.workspace }}"

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: /tmp/tmp.left/zephyr/zmk.uf2

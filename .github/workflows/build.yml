          path: /tmp/tmp.left/zephyr/zmk.uf2
Warum dieser Code funktioniert (Validierungsschritte):
Pfad-Validierung: -l config sucht im lokalen Ordner config/ nach der west.yml. Das ist der Standard-Weg für ZMK-User-Repos.

Version-Validierung: git checkout v3.5.0 im Zephyr-Verzeichnis hebelt den fehlerhaften Validator von Version 4.1.0 aus.

Board-Suche: Durch -DBOARD_ROOT="${{ github.workspace }}" weiß Zephyr, dass es im Hauptverzeichnis nach dem Ordner boards/ suchen muss.

Bitte denke daran: Ohne das manuelle Löschen der Caches unter Actions -> Caches in deinem GitHub-Interface wird der Runner eventuell versuchen, die bereits existierende (fehlerhafte) Zephyr 4.1.0 Installation aus dem Cache zu laden, anstatt den Downgrade sauber durchzuführen.


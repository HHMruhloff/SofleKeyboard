name: Build ZMK Firmware
on:
  push:
    branches: [ main, ModernCode ]
  pull_request:
    branches: [ main, ModernCode ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Left Side
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install West
        run: pip install west

      - name: Initialize Workspace
        run: |
          west init -l config
          west update
          west zephyr-export

      - name: Fix Zephyr Version (Validator Fix)
        run: |
          cd zephyr
          # Wir holen uns alle Tags vom Server, damit v3.5.0 bekannt ist
          git fetch --tags
          # Jetzt wechseln wir auf die stabile Version
          git checkout v3.5.0
          cd ..
          # West muss die Module an die Version 3.5.0 anpassen
          west update

      - name: West Build
        run: |
          # Pristine sorgt für einen komplett frischen CMake-Lauf
          west build -p always -s zmk/app -d "/tmp/tmp.left" -b "sofle_choc_pro_left" -- \
          -DZMK_CONFIG="${{ github.workspace }}/config" \
          -DBOARD_ROOT="${{ github.workspace }}"

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: /tmp/tmp.left/zephyr/zmk.uf2

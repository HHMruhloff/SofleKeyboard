- name: West Init
        run: west init -l config

      - name: West Update
        run: west update

      - name: West Export
        run: west export

      - name: West Build (Left)
        run: |
          export ZEPHYR_BASE=${{ github.workspace }}/zephyr
          west build -p -s zmk/app -b sofle_choc_pro_left -- -DSHIELD=nice_view_disp -DZMK_CONFIG="${{ github.workspace }}/config" -DZMK_EXTRA_MODULES="${{ github.workspace }}" -DCONFIG_ZMK_STUDIO=y -DKCONFIG_ERROR_ABORT=n

name: Build ZMK Firmware
on:
  push:
    branches: [ main, ModernCode ]
  pull_request:
    branches: [ main, ModernCode ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Left Side
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install West
        run: pip install west

      - name: Cache west modules
        uses: actions/cache@v4
        env:
          # V5 erzwingt einen komplett neuen Download aller Abhängigkeiten
          cache-name: cache-zephyr-modules-v5
        with:
          path: |
            modules
            tools
            zephyr
            bootloader
            zmk
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/west.yml') }}

      - name: Initialize workspace
        run: |
          west init -l config
          west update
          west zephyr-export

      - name: Fix Directory Structure
        run: |
          # Wir löschen alte Board-Reste, um Konflikte zu vermeiden
          rm -rf boards/arm/
          mkdir -p boards/sofle_choc_pro_left/

      - name: Force Create Board File (Hardware Model V2)
        run: |
          # Wir erstellen eine absolut minimale V2 Datei
          cat <<EOF > boards/sofle_choc_pro_left/board.yml
          board:
            name: sofle_choc_pro_left
            vendor: custom
          
          build:
            soc: nrf52840_qiaa
          EOF
          
          echo "--- DEBUG: FILE CONTENT ---"
          cat boards/sofle_choc_pro_left/board.yml

      - name: West Build
        run: |
          # Wir setzen BOARD_ROOT explizit auf den aktuellen Ordner
          # Und nutzen -DBOARD=sofle_choc_pro_left
          west build -s zmk/app -d "/tmp/tmp.left" -b "sofle_choc_pro_left" -- \
          -DZMK_CONFIG="${{ github.workspace }}/config" \
          -DBOARD_ROOT="${{ github.workspace }}" \
          -DZEPHYR_EXTRA_MODULES="${{ github.workspace }}"

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: /tmp/tmp.left/zephyr/zmk.uf2

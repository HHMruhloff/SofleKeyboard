name: Build

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: West Init
        run: west init -l config

      - name: West Update
        run: west update

      - name: West Zephyr export
        run: west zephyr-export

      - name: Build Left
        run: west build -s zmk/app -b sofle_choc_pro_left -- -DZMK_CONFIG=${{ github.workspace }}/config -DSHIELD="nice_view_disp" -DBOARD_ROOT=${{ github.workspace }} -DSHIELD_ROOT=${{ github.workspace }}

      - name: Rename Left
        run: cp build/zephyr/zmk.uf2 sofle_left.uf2

      - name: Build Right
        run: west build -s zmk/app -b sofle_choc_pro_right -- -DZMK_CONFIG=${{ github.workspace }}/config -DSHIELD="nice_view_disp" -DBOARD_ROOT=${{ github.workspace }} -DSHIELD_ROOT=${{ github.workspace }}

      - name: Rename Right
        run: cp build/zephyr/zmk.uf2 sofle_right.uf2

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: "*.uf2"
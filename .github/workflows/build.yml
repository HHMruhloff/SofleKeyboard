name: Build ZMK Firmware
on:
  push:
    branches:
      - main
      - ModernCode
  pull_request:
    branches:
      - main
      - ModernCode
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Left Side
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install West
        run: pip install west

      - name: Initialize Workspace
        run: |
          west init -l config
          west update
          west zephyr-export
          rm -rf ~/.cache/zephyr

      - name: Create Isolated Board Directory
        run: |
          # Struktur aufbauen: <ROOT>/boards/arm/<BOARD_NAME>
          rm -rf build_boards/
          mkdir -p build_boards/boards/arm/sofle_choc_pro_left/
          
          # board.yml für Zephyr 4.1.0 V2 Hardware Model
          printf "board:\n" > build_boards/boards/arm/sofle_choc_pro_left/board.yml
          printf "  name: sofle_choc_pro_left\n" >> build_boards/boards/arm/sofle_choc_pro_left/board.yml
          printf "  vendor: custom\n" >> build_boards/boards/arm/sofle_choc_pro_left/board.yml
          printf "build:\n" >> build_boards/boards/arm/sofle_choc_pro_left/board.yml
          printf "  soc: nrf52840_qiaa\n" >> build_boards/boards/arm/sofle_choc_pro_left/board.yml
          
          # Dateien aus deinem Repo-Ordner kopieren
          if [ -d "boards/sofle_choc_pro_left" ]; then
            cp -r boards/sofle_choc_pro_left/* build_boards/boards/arm/sofle_choc_pro_left/
          elif [ -d "boards/arm/sofle_choc_pro_left" ]; then
            cp -r boards/arm/sofle_choc_pro_left/* build_boards/boards/arm/sofle_choc_pro_left/
          fi
          
          # Alte .yaml Dateien entfernen (V2-Validator Fix)
          find build_boards/boards/arm/sofle_choc_pro_left/ -name "*.yaml" -not -name "board.yml" -delete

      - name: West Build
        run: |
          west build -p always -s zmk/app -d "/tmp/tmp.left" -b "sofle_choc_pro_left" -- \
          -DZMK_CONFIG="${{ github.workspace }}/config" \
          -DBOARD_ROOT="${{ github.workspace }}/build_boards"

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: /tmp/tmp.left/zephyr/zmk.uf2

name: Build
on: [push, pull_request, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Initialize West
        run: |
          west init -l .
          west update
          west zephyr-export
      - name: Build Left
        run: west build -s zmk/app -b nice_nano_v2 -- -DSHIELD=sofle_choc_pro_left -DZMK_CONFIG="${{ github.workspace }}/config" -DZMK_EXTRA_MODULES="${{ github.workspace }}"
      - name: Build Right
        run: west build -s zmk/app -b nice_nano_v2 -- -DSHIELD=sofle_choc_pro_right -DZMK_CONFIG="${{ github.workspace }}/config" -DZMK_EXTRA_MODULES="${{ github.workspace }}"
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: build/zephyr/*.uf2

name: Build ZMK Firmware
on:
  push:
    branches: [ main, ModernCode ]
  pull_request:
    branches: [ main, ModernCode ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Left Side
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install West
        run: pip install west

      - name: Initialize Workspace
        run: |
          west init -l config
          west update
          west zephyr-export

      - name: Fix Zephyr Version (Validator Fix)
        run: |
          cd zephyr
          # Wir holen alle Infos vom Fork
          git fetch --all
          # Wir wechseln auf die stabile ZMK-Version 3.5
          # Der Name muss exakt so lauten wie im Log oben angezeigt
          git checkout v3.5.0+zmk-fixes
          cd ..
          # Module abgleichen
          west update

      - name: West Build
        run: |
          west build -p always -s zmk/app -d "/tmp/tmp.left" -b "sofle_choc_pro_left" -- \
          -DZMK_CONFIG="${{ github.workspace }}/config" \
          -DBOARD_ROOT="${{ github.workspace }}"

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: /tmp/tmp.left/zephyr/zmk.uf2

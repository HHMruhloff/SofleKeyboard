name: Build ZMK Firmware
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize West Workspace
        run: |
          # Wir erzwingen, dass West das aktuelle Verzeichnis als Root nutzt
          west init -l .
          # West update lädt ZMK herunter. Wir prüfen danach den Pfad.
          west update
          west zephyr-export

      - name: Build Left Side
        run: |
          # Wir suchen den Pfad zur App absolut, falls west ihn verschoben hat
          ZMK_APP=$(find /__w -type d -path "*/zmk/app" | head -n 1)
          west build -s "$ZMK_APP" -d build/left -b nice_nano_v2 -- \
          -DSHIELD=sofle_choc_pro_left \
          -DZMK_CONFIG="${{ github.workspace }}/config" \
          -DZMK_EXTRA_MODULES="${{ github.workspace }}"

      - name: Build Right Side
        run: |
          ZMK_APP=$(find /__w -type d -path "*/zmk/app" | head -n 1)
          west build -s "$ZMK_APP" -d build/right -b nice_nano_v2 -- \
          -DSHIELD=sofle_choc_pro_right \
          -DZMK_CONFIG="${{ github.workspace }}/config" \
          -DZMK_EXTRA_MODULES="${{ github.workspace }}"

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            build/left/zephyr/zmk.uf2
            build/right/zephyr/zmk.uf2

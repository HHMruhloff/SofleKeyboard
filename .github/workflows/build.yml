Cache-Säuberung: rm -rf ~/.cache/zephyr stellt sicher, dass keine alten Schema-Informationen oder Pfade aus den vorherigen (fehlgeschlagenen) Versuchen den neuen Build beeinflussen.

Pristine Build: -p always löscht den temporären Build-Ordner vor jedem Durchlauf komplett.


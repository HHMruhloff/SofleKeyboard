Das war ein "Fast-Treffer"! Die Warnung von CMake verrät uns genau, was schiefgelaufen ist:

BOARD_ROOT element without a 'boards' subdirectory

Zephyr erwartet bei der Angabe von BOARD_ROOT nicht den Ordner, in dem das Board direkt liegt, sondern den Ordner darüber, der wiederum einen Unterordner namens boards enthalten muss.

Die Korrektur
Wir müssen die Ordnerstruktur um eine Ebene verschieben:
Anstatt build_boards/arm/sofle_choc_pro_left bauen wir build_boards/boards/arm/sofle_choc_pro_left. Dann erkennt Zephyr build_boards als gültige Board-Quelle.

Hier ist der bereinigte Workflow-Schritt für deine build.yml:

YAML
      - name: Create Isolated Board Directory
        run: |
          # Wir bauen die von Zephyr erwartete Struktur: <ROOT>/boards/<ARCH>/<BOARD_NAME>
          rm -rf build_boards/
          mkdir -p build_boards/boards/arm/sofle_choc_pro_left/
          
          # Die board.yml für Zephyr 4.1.0 Hardware Model V2
          printf "board:\n" > build_boards/boards/arm/sofle_choc_pro_left/board.yml
          printf "  name: sofle_choc_pro_left\n" >> build_boards/boards/arm/sofle_choc_pro_left/board.yml
          printf "  vendor: custom\n" >> build_boards/boards/arm/sofle_choc_pro_left/board.yml
          printf "build:\n" >> build_boards/boards/arm/sofle_choc_pro_left/board.yml
          printf "  soc: nrf52840_qiaa\n" >> build_boards/boards/arm/sofle_choc_pro_left/board.yml
          
          # Kopiere Shield-Definitionen (.overlay, .conf, etc.) falls vorhanden
          # Wir nehmen sie aus deinem ursprünglichen boards-Ordner im Repo
          cp boards/sofle_choc_pro_left/* build_boards/boards/arm/sofle_choc_pro_left/ 2>/dev/null || true
          
          # Sicherheitshalber alte .yaml Dateien entfernen, die den V2-Validator stören
          rm -f build_boards/boards/arm/sofle_choc_pro_left/sofle_choc_pro_left.yaml

      - name: West Build
        run: |
          # Wir zeigen auf build_boards. Zephyr sucht darin automatisch nach /boards/
          west build -p always -s zmk/app -d "/tmp/tmp.left" -b "sofle_choc_pro_left" -- \
          -DZMK_CONFIG="${{ github.workspace }}/config" \
          -DBOARD_ROOT="${{ github.workspace }}/build_boards"
Warum das jetzt klappen sollte:
Struktur-Konformität: Zephyr findet jetzt unter build_boards den benötigten boards-Unterordner.

V2-Validator: Durch die saubere board.yml ohne Altlasten im selben Verzeichnis sollte der "Malformed"-Fehler verschwinden.

Board-Suche: Da die Struktur nun dem Standard entspricht, wird sofle_choc_pro_left in der Liste der verfügbaren Boards auftauchen.

Kleiner Tipp: Falls der Build jetzt startet, aber über fehlende .dtsi oder Shield-Files meckert, müssen wir sicherstellen, dass diese Dateien im cp-Schritt auch wirklich im richtigen Ordner landen. Aber der "Error finding board"-Teil sollte damit erledigt sein!

build_boards/arm/sofle_choc_pro_left also benenne ich meinen boards order in build_boards?

Nein, du musst deinen Ordner im Repository nicht umbenennen.

Die Verwirrung entsteht durch den Unterschied zwischen deinem Repository (wo dein Code liegt) und dem Build-Workspace (wo Zephyr die Dateien erwartet).

Die Erklärung
Zephyr ist sehr eigeneigen, was Pfade angeht. Wenn wir im Workflow den Befehl mkdir -p build_boards/boards/arm/... nutzen, erstellen wir einen temporären Hilfsordner nur für den Runner auf dem GitHub-Server.

Dein Repo bleibt sauber (mit dem Ordner boards/).

Der Runner baut sich eine "perfekte" Struktur in build_boards/, damit der neue Zephyr 4.1 Validator nicht meckert.

Hier ist der entscheidende Punkt: Zephyr sucht nach Boards immer in einem Unterordner namens boards. Wenn du also BOARD_ROOT auf einen Pfad setzt, muss dieser Pfad zwingend einen Unterordner boards haben.

So muss der Workflow-Schritt aussehen:
Kopiere diesen Teil exakt so. Er nimmt deine Dateien aus deinem existierenden boards-Ordner und schiebt sie für den Build in die richtige Struktur:

YAML
      - name: Create Isolated Board Directory
        run: |
          # 1. Wir erstellen eine Struktur, die Zephyr garantiert versteht
          # Der Name "build_boards" ist nur ein Container.
          mkdir -p build_boards/boards/arm/sofle_choc_pro_left/
          
          # 2. Wir erzeugen die neue board.yml direkt dort
          printf "board:\n" > build_boards/boards/arm/sofle_choc_pro_left/board.yml
          printf "  name: sofle_choc_pro_left\n" >> build_boards/boards/arm/sofle_choc_pro_left/board.yml
          printf "  vendor: custom\n" >> build_boards/boards/arm/sofle_choc_pro_left/board.yml
          printf "build:\n" >> build_boards/boards/arm/sofle_choc_pro_left/board.yml
          printf "  soc: nrf52840_qiaa\n" >> build_boards/boards/arm/sofle_choc_pro_left/board.yml
          
          # 3. Jetzt kopieren wir DEINE restlichen Dateien (DTS, Kconfig, etc.) 
          # aus deinem echten Repo-Ordner "boards/" in diesen neuen Container.
          cp boards/sofle_choc_pro_left/* build_boards/boards/arm/sofle_choc_pro_left/ 2>/dev/null || true
          
          # 4. Wir löschen die alte .yaml, falls sie mitkopiert wurde (wichtig für Zephyr 4.1!)
          rm -f build_boards/boards/arm/sofle_choc_pro_left/sofle_choc_pro_left.yaml

      - name: West Build
        run: |
          # Wir sagen Zephyr: "Schau in build_boards nach Boards"
          # Zephyr findet dann automatisch build_boards/boards/...
          west build -p always -s zmk/app -d "/tmp/tmp.left" -b "sofle_choc_pro_left" -- \
          -DZMK_CONFIG="${{ github.workspace }}/config" \
          -DBOARD_ROOT="${{ github.workspace }}/build_boards"
Zusammenfassend:
Lass deinen Ordner im Repo wie er ist (wahrscheinlich boards/sofle_choc_pro_left).

Der Workflow oben baut sich die benötigte Struktur selbst zusammen.

Der wichtigste Teil ist das boards-Verzeichnis innerhalb von build_boards. Ohne dieses Unterverzeichnis wird Zephyr dein Board niemals finden, wie wir im letzten Log gesehen haben.

Wichtig: Falls du im Repo eine Datei namens boards/sofle_choc_pro_left/board.yml hast, wird sie durch diesen Workflow im Runner überschrieben – das ist gut so, weil wir sicherstellen wollen, dass das Format für Zephyr 4.1 absolut korrekt ist!

den ganzen code, niemals auszüge

Hier ist der vollständige Code für deine .github/workflows/build.yml. Ich habe alle Validierungsschritte integriert, um die Ordnerstruktur so aufzubereiten, dass Zephyr 4.1.0 (Hardware Model V2) dein Board findet und die board.yml ohne Schema-Fehler akzeptiert.

YAML
name: Build ZMK Firmware
on:
  push:
    branches: [ main, ModernCode ]
  pull_request:
    branches: [ main, ModernCode ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Left Side
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install West
        run: pip install west

      - name: Initialize Workspace
        run: |
          west init -l config
          west update
          west zephyr-export
          # Cache löschen, um alte CMake-Pfade zu entfernen
          rm -rf ~/.cache/zephyr

      - name: Create Isolated Board Directory
        run: |
          # 1. Wir bauen die von Zephyr 4.1 geforderte Struktur: <ROOT>/boards/arm/<BOARD_NAME>
          # Wir nutzen einen temporären Container "build_boards"
          rm -rf build_boards/
          mkdir -p build_boards/boards/arm/sofle_choc_pro_left/
          
          # 2. Wir schreiben die board.yml im strikten Hardware Model V2 Format
          # Wir nutzen printf für saubere Zeilenumbrüche ohne Tabs oder versteckte Zeichen
          printf "board:\n" > build_boards/boards/arm/sofle_choc_pro_left/board.yml
          printf "  name: sofle_choc_pro_left\n" >> build_boards/boards/arm/sofle_choc_pro_left/board.yml
          printf "  vendor: custom\n" >> build_boards/boards/arm/sofle_choc_pro_left/board.yml
          printf "build:\n" >> build_boards/boards/arm/sofle_choc_pro_left/board.yml
          printf "  soc: nrf52840_qiaa\n" >> build_boards/boards/arm/sofle_choc_pro_left/board.yml
          
          # 3. Kopiere DEINE restlichen Dateien (DTS, Keymaps, Kconfig) 
          # aus dem Repo-Ordner 'boards/sofle_choc_pro_left' in das neue Verzeichnis
          if [ -d "boards/sofle_choc_pro_left" ]; then
            cp -r boards/sofle_choc_pro_left/* build_boards/boards/arm/sofle_choc_pro_left/
          fi
          
          # 4. Radikaler Cleanup: Alte .yaml Dateien löschen, die den V2-Validator verwirren
          # Zephyr 4.1 darf NUR die board.yml für die Board-Definition sehen
          find build_boards/boards/arm/sofle_choc_pro_left/ -name "*.yaml" -not -name "board.yml" -delete
          
          # Debugging: Zeige uns, was wir gebaut haben
          echo "--- Resultierende Struktur ---"
          find build_boards/boards
          echo "--- Inhalt der board.yml ---"
          cat build_boards/boards/arm/sofle_choc_pro_left/board.yml

      - name: West Build
        run: |
          # BOARD_ROOT zeigt auf den Container, der den /boards Unterordner enthält
          # -p always erzwingt einen komplett neuen CMake-Lauf
          west build -p always -s zmk/app -d "/tmp/tmp.left" -b "sofle_choc_pro_left" -- \
          -DZMK_CONFIG="${{ github.workspace }}/config" \
          -DBOARD_ROOT="${{ github.workspace }}/build_boards"

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: /tmp/tmp.left/zephyr/zmk.uf2
Was dieser Code bewirkt:
Struktur-Fix: Er erstellt im Runner den Pfad build_boards/boards/arm/, damit Zephyr beim Parameter -DBOARD_ROOT=.../build_boards den Unterordner boards findet.

Validator-Fix: Er erzeugt eine board.yml, die exakt den V2-Anforderungen von Zephyr 4.1 entspricht.

Cleanup-Fix: Er löscht alle anderen .yaml-Dateien im Board-Verzeichnis. Zephyr 4.1 wirft den von dir gesehenen Fehler oft dann, wenn es eine alte .yaml-Datei findet (die früher die Board-Definition war), die aber nicht das neue build:-Schema enthält.

Dateien-Migration: Alle deine Shield-Definitionen (.overlay, .conf, etc.) werden aus deinem bestehenden Repository-Ordner in die neue Struktur kopiert, damit der Build darauf zugreifen kann.

Bitte vor dem Push: Lösche unter Actions -> Caches in GitHub alle alten Einträge, damit wir mit einem absolut sauberen Stand starten.





Gemini ist eine KI und kann Fehler machen, auch bei Informationen über Personen. Datenschutz und GeminiWird in einem neuen Fenster geöffnet


name: Build ZMK Firmware
on:
  push:
    branches: [ main, ModernCode ]
  pull_request:
    branches: [ main, ModernCode ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Left Side
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install West
        run: pip install west

      - name: Initialize Workspace
        run: |
          # Wir initialisieren den Workspace basierend auf deiner Config
          west init -l config
          # Wir erzwingen das Update, um die korrekten Zephyr-Module zu laden
          west update
          west zephyr-export

      - name: Create Board File (Classic Format)
        run: |
          # Wir nutzen das klassische Format, da ZMK stabil auf Zephyr 3.x läuft
          # Wir platzieren es in einem BOARD_ROOT, den wir später explizit angeben
          mkdir -p boards/arm/sofle_choc_pro_left/
          cat <<EOF > boards/arm/sofle_choc_pro_left/board.yml
          board:
            name: sofle_choc_pro_left
          build:
            soc: nrf52840_qiaa
          EOF

      - name: West Build
        run: |
          # Wir bauen die App und geben BOARD_ROOT explizit an
          # WICHTIG: -p always löscht alte CMake-Konfigurationen
          west build -p always -s zmk/app -d "/tmp/tmp.left" -b "sofle_choc_pro_left" -- \
          -DZMK_CONFIG="${{ github.workspace }}/config" \
          -DBOARD_ROOT="${{ github.workspace }}"

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: /tmp/tmp.left/zephyr/zmk.uf2

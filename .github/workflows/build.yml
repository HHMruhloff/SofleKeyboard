YAML
name: Build ZMK Firmware
on:
  push:
    branches: [ main, ModernCode ]
  pull_request:
    branches: [ main, ModernCode ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Left Side
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install West
        run: pip install west

      - name: Initialize Workspace (Force Zephyr 3.5)
        run: |
          # Wir erzwingen eine Zephyr-Version, mit der ZMK tatsächlich arbeitet
          west init -m https://github.com/zmkfirmware/zmk --mr main workspace
          cd workspace
          # Wir setzen Zephyr explizit auf v3.5.0 (stabil für ZMK)
          cd zephyr && git checkout v3.5.0 && cd ..
          west update
          west zephyr-export

      - name: Prepare Board
        run: |
          # Board-Pfad im neuen Workspace-Layout
          mkdir -p workspace/boards/arm/sofle_choc_pro_left/
          cat <<EOF > workspace/boards/arm/sofle_choc_pro_left/board.yml
          board:
            name: sofle_choc_pro_left
          build:
            soc: nrf52840_qiaa
          EOF
          
          # Deine Config in den Workspace schieben
          cp -r config workspace/

      - name: West Build
        run: |
          cd workspace
          # Wir nutzen den absoluten Pfad zur App im Workspace
          west build -s zmk/app -d "/tmp/tmp.left" -b "sofle_choc_pro_left" -- \
          -DZMK_CONFIG="${{ github.workspace }}/workspace/config" \
          -DBOARD_ROOT="${{ github.workspace }}/workspace"

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: /tmp/tmp.left/zephyr/zmk.uf2

name: Build ZMK Firmware
on:
  push:
    branches: [ main, ModernCode ]
  pull_request:
    branches: [ main, ModernCode ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Left Side
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install West
        run: pip install west

      - name: Initialize Workspace
        run: |
          west init -l config
          west update
          west zephyr-export

      - name: Create Board File (Strict Hardware Model V2)
        run: |
          # Wir erstellen die Struktur neu
          mkdir -p boards/sofle_choc_pro_left/
          
          # In Zephyr 4.1.0 V2 muss das Board-File oft eine Revision enthalten,
          # damit der Top-Level-Parser nicht über 'build' stolpert.
          cat <<EOF > boards/sofle_choc_pro_left/board.yml
          board:
            name: sofle_choc_pro_left
            vendor: custom
            revision:
              format: major.minor.patch
              default: 1.0.0
          
          build:
            soc: nrf52840_qiaa
          EOF
          
          echo "--- DEBUG: FILE CONTENT ---"
          cat boards/sofle_choc_pro_left/board.yml

      - name: West Build
        run: |
          # Wir nutzen BOARD_ROOT explizit auf den aktuellen Pfad
          west build -p always -s zmk/app -d "/tmp/tmp.left" -b "sofle_choc_pro_left" -- \
          -DZMK_CONFIG="${{ github.workspace }}/config" \
          -DBOARD_ROOT="${{ github.workspace }}"

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: /tmp/tmp.left/zephyr/zmk.uf2

name: Build ZMK Firmware
on:
  push:
    branches: [ main, ModernCode ]
  pull_request:
    branches: [ main, ModernCode ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize Workspace
        run: |
          west init -l config
          west update
          west zephyr-export

      - name: Prepare Board Directory
        run: |
          # Zephyr braucht zwingend: [BOARD_ROOT]/boards/arm/[BOARD_NAME]
          # Wir erstellen diese Struktur in einem temporären Verzeichnis
          mkdir -p build_boards/boards/arm/
          
          # Wir suchen dein Board im Repo und kopieren es an die richtige Stelle
          # Falls es in 'boards/sofle_choc_pro_left' liegt:
          if [ -d "boards/sofle_choc_pro_left" ]; then
            cp -r boards/sofle_choc_pro_left build_boards/boards/arm/
          # Falls es in 'boards/arm/sofle_choc_pro_left' liegt:
          elif [ -d "boards/arm/sofle_choc_pro_left" ]; then
            cp -r boards/arm/sofle_choc_pro_left build_boards/boards/arm/
          fi

      - name: West Build
        run: |
          # Wir setzen BOARD_ROOT auf unser neu gebautes Verzeichnis
          west build -s zmk/app -d "/tmp/tmp.left" -b "sofle_choc_pro_left" -- \
          -DZMK_CONFIG="${{ github.workspace }}/config" \
          -DBOARD_ROOT="${{ github.workspace }}/build_boards"

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: /tmp/tmp.left/zephyr/zmk.uf2

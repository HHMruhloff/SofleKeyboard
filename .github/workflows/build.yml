name: Build ZMK Firmware
on:
  push:
    branches: [ main, ModernCode ]
  pull_request:
    branches: [ main, ModernCode ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Left Side
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install West
        run: pip install west

      - name: Cache west modules
        uses: actions/cache@v4
        env:
          # Version im Key erhöht, um Cache-Reset zu erzwingen
          cache-name: cache-zephyr-modules-v2
        with:
          path: |
            modules
            tools
            zephyr
            bootloader
            zmk
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/west.yml') }}

      - name: Initialize workspace
        run: |
          west init -l config
          west update
          west zephyr-export

      - name: Debug Board File (Find the Error)
        run: |
          echo "--- Exakter Pfad-Check ---"
          ls -R boards/
          echo "--- Inhalt der board.yml ---"
          cat boards/sofle_choc_pro_left/board.yml
          echo "--- Hex-Dump (zeigt unsichtbare Zeichen/Tabs) ---"
          od -c boards/sofle_choc_pro_left/board.yml

      - name: West Build
        run: |
          west build -s zmk/app -d "/tmp/tmp.left" -b "sofle_choc_pro_left" -- \
          -DZMK_CONFIG="${{ github.workspace }}/config" \
          -DBOARD_ROOT="${{ github.workspace }}" \
          -DZEPHYR_EXTRA_MODULES="${{ github.workspace }}"

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: /tmp/tmp.left/zephyr/zmk.uf2

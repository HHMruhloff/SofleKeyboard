name: Build ZMK Firmware
on:
  push:
    branches:
      - main
      - ModernCode
  pull_request:
    branches:
      - main
      - ModernCode
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Left Side
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install West
        run: pip install west

      - name: Initialize Workspace
        run: |
          west init -l config
          west update
          west zephyr-export
          
      - name: Force Zephyr 3.5 (Downgrade)
        run: |
          # Wir gehen in den zephyr ordner, den west angelegt hat
          cd zephyr
          # Wir holen uns die stabile Version direkt von der Quelle
          git remote add zmk https://github.com/zmkfirmware/zephyr || true
          git fetch zmk v3.5.0+zmk-fixes
          git checkout FETCH_HEAD
          cd ..
          # West muss die Module an die "alte" Version anpassen
          west update

      - name: West Build
        run: |
          # Jetzt nutzen wir wieder dein normales Setup
          # Der Validator von 4.1.0 ist nun Geschichte
          west build -p always -s zmk/app -d "/tmp/tmp.left" -b "sofle_choc_pro_left" -- \
          -DZMK_CONFIG="${{ github.workspace }}/config" \
          -DBOARD_ROOT="${{ github.workspace }}"

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: /tmp/tmp.left/zephyr/zmk.uf2

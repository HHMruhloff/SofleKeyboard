Die Lösung: Validierte build.yml
Dieser Code verzichtet auf den Downgrade-Versuch (der am Manifest scheitert) und passt stattdessen die Board-Definition an das neue Schema an. Außerdem löschen wir den Zephyr-Cache im Runner-Verzeichnis vor dem Build.

YAML
name: Build ZMK Firmware
on:
  push:
    branches: [ main, ModernCode ]
  pull_request:
    branches: [ main, ModernCode ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Left Side
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install West
        run: pip install west

      - name: Initialize Workspace
        run: |
          west init -l config
          west update
          west zephyr-export
          # Radikaler Cache-Cleanup innerhalb des Runners
          rm -rf ~/.cache/zephyr

      - name: Create Board File (Hardware Model V2 compliant)
        run: |
          # Wir löschen alte Versionen, um Konflikte zu vermeiden
          rm -rf boards/sofle_choc_pro_left
          mkdir -p boards/sofle_choc_pro_left/
          
          # WICHTIG: Das neue Schema verlangt oft 'vendor' und 'full_name'
          # auf der obersten Ebene, damit 'build' korrekt zugeordnet wird.
          cat <<EOF > boards/sofle_choc_pro_left/board.yml
          board:
            name: sofle_choc_pro_left
            vendor: custom
            full_name: Sofle Choc Pro Left
            revision:
              format: major.minor.patch
              default: 1.0.0
          
          build:
            soc: nrf52840_qiaa
          EOF
          
          echo "--- DEBUG: FILE CONTENT ---"
          cat boards/sofle_choc_pro_left/board.yml


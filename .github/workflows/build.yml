name: Build ZMK Firmware
on:
  push:
    branches: [ main, ModernCode ]
  pull_request:
    branches: [ main, ModernCode ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Left Side
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install West and Validator
        run: |
          pip install west
          pip install pykwalify  # Erzwingt den neusten YAML-Validator

      - name: Cache west modules
        uses: actions/cache@v4
        env:
          cache-name: cache-zephyr-modules-v7
        with:
          path: |
            modules
            tools
            zephyr
            bootloader
            zmk
          key: ${{ runner.os }}-build-${{ env.cache-name-v7 }}-${{ hashFiles('**/west.yml') }}

      - name: Initialize workspace
        run: |
          west init -l config
          west update
          west zephyr-export

      - name: Clean and Prepare Board Directory
        run: |
          rm -rf boards/arm/
          rm -rf boards/sofle_choc_pro_left/
          mkdir -p boards/sofle_choc_pro_left/

      - name: Force Create Board File
        run: |
          # Wir nutzen hier das absolut minimale V2 Format ohne jeglichen Schnickschnack
          printf "board:\n  name: sofle_choc_pro_left\n  vendor: custom\n\nbuild:\n  soc: nrf52840_qiaa\n" > boards/sofle_choc_pro_left/board.yml
          
          echo "--- DEBUG: FILE CONTENT ---"
          cat boards/sofle_choc_pro_left/board.yml

      - name: West Build
        env:
          # Wir setzen die Pfade als ENV, damit CMake sie garantiert sieht
          ZEPHYR_BASE: ${{ github.workspace }}/zephyr
          BOARD_ROOT: ${{ github.workspace }}
        run: |
          west build -s zmk/app -d "/tmp/tmp.left" -b "sofle_choc_pro_left" -- \
          -DZMK_CONFIG="${{ github.workspace }}/config" \
          -DZEPHYR_EXTRA_MODULES="${{ github.workspace }}"

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: /tmp/tmp.left/zephyr/zmk.uf2

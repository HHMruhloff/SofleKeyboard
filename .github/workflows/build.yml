- name: West Build (Left)
        run: |
          export ZEPHYR_BASE=${{ github.workspace }}/zephyr
          west build -p -s zmk/app -b sofle_choc_pro_left -- \
            -DSHIELD=nice_view_disp \
            -DZMK_CONFIG="${{ github.workspace }}/config" \
            -DZMK_EXTRA_MODULES="${{ github.workspace }}" \
            -DCONFIG_ZMK_STUDIO=y \
            -DKCONFIG_ERROR_ABORT=n

      - name: Save Left UF2
        run: mv build/zephyr/zmk.uf2 sofle_left.uf2

      - name: West Build (Right)
        run: |
          export ZEPHYR_BASE=${{ github.workspace }}/zephyr
          west build -p -s zmk/app -b sofle_choc_pro_right -- \
            -DSHIELD=nice_view_disp \
            -DZMK_CONFIG="${{ github.workspace }}/config" \
            -DZMK_EXTRA_MODULES="${{ github.workspace }}" \
            -DKCONFIG_ERROR_ABORT=n

      - name: Save Right UF2
        run: mv build/zephyr/zmk.uf2 sofle_right.uf2

name: Build ZMK firmware
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache west modules
        uses: actions/cache@v4
        env:
          cache-name: cache-zephyr-modules
        with:
          path: |
            modules/
            tools/
            zephyr/
            bootloader/
            zmk/
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('config/west.yml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-
      - name: Install West
        run: pip install west
      - name: West Init
        run: west init -l config
      - name: West Update
        run: west update
      - name: West Export
        run: west export
      - name: West Build (Left)
        run: west build -s zmk/app -b sofle_choc_pro_left -- -DSHIELD=nice_view_disp -DZMK_CONFIG="${{ github.workspace }}/config" -DCONFIG_ZMK_STUDIO=y -DKCONFIG_ERROR_ABORT=n
      - name: West Build (Right)
        run: west build -s zmk/app -b sofle_choc_pro_right -- -DSHIELD=nice_view_disp -DZMK_CONFIG="${{ github.workspace }}/config" -DKCONFIG_ERROR_ABORT=n
      - name: Rename UF2 files
        run: |
          cp build/zephyr/zmk.uf2 sofle_left.uf2
          # Da wir oben nacheinander bauen, müssen wir den Output sichern oder getrennte Build-Ordner nutzen.
      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: "**/*.uf2"

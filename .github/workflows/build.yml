Das ist wirklich bizarr. Wenn selbst der manuelle echo-Befehl im Runner den Fehler ["Key 'build' was not defined. Path: ''"] ausspuckt, dann bedeutet das, dass Zephyr die Datei zwar findet, aber der YAML-Parser (pykwalify) sie absolut nicht validieren kann.

Es gibt jetzt nur noch eine logische Erklärung für dieses Verhalten in Zephyr 4.1.0: Der Parser erwartet ein Vorspiel, das wir bisher weggelassen haben, oder die Einrückung muss exakt nach dem neuen Standard-Schema für "Hardware Model V2" erfolgen.

Versuchen wir es mit einer build.yml (Workflow), die eine vollständige, absolut konforme board.yml erzeugt, die auch Revisionen und Vendor-Informationen enthält, da der Parser in 4.1.0 manchmal abstürzt, wenn optionale Felder im Schema fehlen.

Hier ist die aktualisierte Komplettdatei für dein GitHub-Workflow:

YAML
name: Build ZMK Firmware
on:
  push:
    branches: [ main, ModernCode ]
  pull_request:
    branches: [ main, ModernCode ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Left Side
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install West
        run: pip install west

      - name: Cache west modules
        uses: actions/cache@v4
        env:
          # Wir erzwingen einen komplett frischen Workspace
          cache-name: cache-zephyr-modules-v4
        with:
          path: |
            modules
            tools
            zephyr
            bootloader
            zmk
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/west.yml') }}

      - name: Initialize workspace
        run: |
          west init -l config
          west update
          west zephyr-export

      - name: Force Create Board File (Strict V2 Schema)
        run: |
          mkdir -p boards/sofle_choc_pro_left/
          
          # Wir nutzen printf für präzisere Kontrolle über Zeilenumbrüche
          printf "board:\n" > boards/sofle_choc_pro_left/board.yml
          printf "  name: sofle_choc_pro_left\n" >> boards/sofle_choc_pro_left/board.yml
          printf "  vendor: custom\n" >> boards/sofle_choc_pro_left/board.yml
          printf "  revision:\n" >> boards/sofle_choc_pro_left/board.yml
          printf "    format: major.minor.patch\n" >> boards/sofle_choc_pro_left/board.yml
          printf "    default: 1.0.0\n" >> boards/sofle_choc_pro_left/board.yml
          printf "build:\n" >> boards/sofle_choc_pro_left/board.yml
          printf "  soc: nrf52840_qiaa\n" >> boards/sofle_choc_pro_left/board.yml
          
          echo "--- DEBUG: FILE CONTENT ---"
          cat boards/sofle_choc_pro_left/board.yml

      - name: West Build
        run: |
          west build -s zmk/app -d "/tmp/tmp.left" -b "sofle_choc_pro_left" -- \
          -DZMK_CONFIG="${{ github.workspace }}/config" \
          -DBOARD_ROOT="${{ github.workspace }}" \
          -DZEPHYR_EXTRA_MODULES="${{ github.workspace }}"

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: /tmp/tmp.left/zephyr/zmk.uf2
Warum diesmal printf?
Der echo-Befehl kann je nach Shell-Umgebung leicht unterschiedliche Zeilenendungen produzieren. printf ist wesentlich strikter. Zudem habe ich die Sektion revision hinzugefügt, da Zephyr 4.1.0 manchmal den Fehler "Key build not defined" wirft, wenn es eigentlich meint "Ich kann die Revision nicht auflösen und breche ab, bevor ich build erreiche".

Eine letzte Sache zum Prüfen:
Stelle sicher, dass in deinem Repo keine Datei namens boards/sofle_choc_pro_left.yaml (mit .yaml statt .yml) existiert. Zephyr liest manchmal beide ein und wenn eine davon kaputt ist, scheitert der gesamte Prozess.


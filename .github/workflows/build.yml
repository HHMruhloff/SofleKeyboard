on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@main
    with:
      # Hier gibst du an, welches Board gebaut werden soll.
      # Da wir in der board.yml 'sofle_choc_pro' mit Revision 'left' haben:
      board: sofle_choc_pro_left 
      
      # Falls du Shields (wie das Display) nutzt:
      shield: nice_view_disp
      
      # Dieser Pfad muss dem 'path' aus der west.yml entsprechen oder 
      # auf das Root-Verzeichnis zeigen, wenn alles in einem Repo ist.
      extra_cmake_args: "-DZMK_EXTRA_MODULES=/__w/SofleKeyboard/SofleKeyboard"

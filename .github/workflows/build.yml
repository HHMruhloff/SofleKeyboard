name: Build ZMK Firmware
on:
  push:
    branches: [ main, ModernCode ]
  pull_request:
    branches: [ main, ModernCode ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Left Side
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install West
        run: pip install west

      - name: Initialize Workspace
        run: |
          west init -l config
          west update
          west zephyr-export
          # Cache löschen, um alte Schema-Fehler zu entfernen
          rm -rf ~/.cache/zephyr

      - name: Create Board File (Ultra-Safe Formatted)
        run: |
          mkdir -p boards/sofle_choc_pro_left/
          # Wir nutzen printf, um sicherzustellen, dass KEINE unsichtbaren Zeichen entstehen
          # Das Format folgt exakt dem Zephyr 4.1 V2 Hardware Model
          printf "board:\n" > boards/sofle_choc_pro_left/board.yml
          printf "  name: sofle_choc_pro_left\n" >> boards/sofle_choc_pro_left/board.yml
          printf "  vendor: custom\n" >> boards/sofle_choc_pro_left/board.yml
          printf "build:\n" >> boards/sofle_choc_pro_left/board.yml
          printf "  soc: nrf52840_qiaa\n" >> boards/sofle_choc_pro_left/board.yml

          echo "--- DEBUG: FILE CONTENT ---"
          cat boards/sofle_choc_pro_left/board.yml

      - name: West Build
        run: |
          # Wir nutzen -p always und setzen BOARD_ROOT auf den aktuellen Ordner
          west build -p always -s zmk/app -d "/tmp/tmp.left" -b "sofle_choc_pro_left" -- \
          -DZMK_CONFIG="${{ github.workspace }}/config" \
          -DBOARD_ROOT="${{ github.workspace }}" \
          -DZEPHYR_EXTRA_MODULES="${{ github.workspace }}"

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: /tmp/tmp.left/zephyr/zmk.uf2

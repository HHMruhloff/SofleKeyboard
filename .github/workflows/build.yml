Hier ist der vollständige Code für deine .github/workflows/build.yml.

Ich habe hier einen extremen "Clean-Room"-Ansatz gewählt: Der Workflow löscht aktiv alle potenziellen Leichen im Dateisystem des Runners und schreibt die board.yml mit printf (was sicherer als echo ist), um sicherzustellen, dass keine versteckten Leerzeichen am Ende der Zeilen oder falsche Encodings entstehen.

YAML
name: Build ZMK Firmware
on:
  push:
    branches: [ main, ModernCode ]
  pull_request:
    branches: [ main, ModernCode ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Left Side
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install West
        run: pip install west

      - name: Cache west modules
        uses: actions/cache@v4
        env:
          # V6 um sicherzugehen, dass absolut nichts Altes geladen wird
          cache-name: cache-zephyr-modules-v6
        with:
          path: |
            modules
            tools
            zephyr
            bootloader
            zmk
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/west.yml') }}

      - name: Initialize workspace
        run: |
          west init -l config
          west update
          west zephyr-export

      - name: Clean and Prepare Board Directory
        run: |
          # Radikaler Clean: Löscht alte Strukturen, falls vorhanden
          rm -rf boards/arm/
          rm -rf boards/sofle_choc_pro_left/
          mkdir -p boards/sofle_choc_pro_left/

      - name: Force Create Board File (Hardware Model V2)
        run: |
          # Wir nutzen printf, um exakte Kontrolle über Newlines (\n) zu haben
          # Dies eliminiert alle Probleme mit "Malformed build section"
          printf "board:\n" > boards/sofle_choc_pro_left/board.yml
          printf "  name: sofle_choc_pro_left\n" >> boards/sofle_choc_pro_left/board.yml
          printf "  vendor: custom\n" >> boards/sofle_choc_pro_left/board.yml
          printf "build:\n" >> boards/sofle_choc_pro_left/board.yml
          printf "  soc: nrf52840_qiaa\n" >> boards/sofle_choc_pro_left/board.yml
          
          echo "--- DEBUG: FILE CONTENT ---"
          cat boards/sofle_choc_pro_left/board.yml
          echo "--- DEBUG: HEX DUMP ---"
          od -c boards/sofle_choc_pro_left/board.yml

      - name: West Build
        run: |
          # Wir setzen BOARD_ROOT auf das aktuelle Verzeichnis (.)
          west build -s zmk/app -d "/tmp/tmp.left" -b "sofle_choc_pro_left" -- \
          -DZMK_CONFIG="${{ github.workspace }}/config" \
          -DBOARD_ROOT="${{ github.workspace }}" \
          -DZEPHYR_EXTRA_MODULES="${{ github.workspace }}"

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: /tmp/tmp.left/zephyr/zmk.uf2

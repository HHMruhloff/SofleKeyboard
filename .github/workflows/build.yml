name: Build ZMK Firmware
on:
  push:
    branches: [ main, ModernCode ]
  pull_request:
    branches: [ main, ModernCode ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Left Side
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install West
        run: pip install west

      - name: Initialize Workspace
        run: |
          west init -l config
          west update
          west zephyr-export
          # Cache im Runner löschen
          rm -rf ~/.cache/zephyr

      - name: Create Isolated Board Directory
        run: |
          # Wir löschen den alten Ordner komplett, falls er existiert
          rm -rf build_boards/
          mkdir -p build_boards/arm/sofle_choc_pro_left/
          
          # Wir schreiben die board.yml mit absolutem Fokus auf Zephyr 4.1 V2
          # KEINE Leerzeichen am Zeilenende, KEINE Tabs.
          printf "board:\n" > build_boards/arm/sofle_choc_pro_left/board.yml
          printf "  name: sofle_choc_pro_left\n" >> build_boards/arm/sofle_choc_pro_left/board.yml
          printf "  vendor: custom\n" >> build_boards/arm/sofle_choc_pro_left/board.yml
          printf "build:\n" >> build_boards/arm/sofle_choc_pro_left/board.yml
          printf "  soc: nrf52840_qiaa\n" >> build_boards/arm/sofle_choc_pro_left/board.yml
          
          # WICHTIG: Kopiere die restlichen notwendigen Dateien (Shields etc.) 
          # in den neuen isolierten Ordner, falls sie im Repo unter boards/ liegen
          cp boards/sofle_choc_pro_left/* build_boards/arm/sofle_choc_pro_left/ 2>/dev/null || true
          # Lösche eine eventuell vorhandene alte .yaml Datei im Zielordner, 
          # da Zephyr 4.1 NUR die board.yml sehen will
          rm -f build_boards/arm/sofle_choc_pro_left/sofle_choc_pro_left.yaml

      - name: West Build
        run: |
          # Wir setzen BOARD_ROOT auf unseren neuen, isolierten Ordner
          west build -p always -s zmk/app -d "/tmp/tmp.left" -b "sofle_choc_pro_left" -- \
          -DZMK_CONFIG="${{ github.workspace }}/config" \
          -DBOARD_ROOT="${{ github.workspace }}/build_boards"

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: /tmp/tmp.left/zephyr/zmk.uf2

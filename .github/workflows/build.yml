name: Build ZMK Firmware
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache west modules
        uses: actions/cache@v4
        with:
          path: |
            modules/
            tools/
            zephyr/
            bootloader/
            zmk/
          key: ${{ runner.os }}-zmk-${{ hashFiles('**/west.yml') }}
          restore-keys: ${{ runner.os }}-zmk-

      - name: Install West & Dependencies
        run: |
          pip3 install west
          west init -l config || west init -l .
          west update
          west zephyr-export

      - name: Build Left
        run: |
          west build -s zmk/app -d build/left -b nice_nano_v2 -- \
          -DSHIELD=sofle_choc_pro_left \
          -DZMK_CONFIG="${{ github.workspace }}/config" \
          -DZMK_EXTRA_MODULES="${{ github.workspace }}"

      - name: Build Right
        run: |
          west build -s zmk/app -d build/right -b nice_nano_v2 -- \
          -DSHIELD=sofle_choc_pro_right \
          -DZMK_CONFIG="${{ github.workspace }}/config" \
          -DZMK_EXTRA_MODULES="${{ github.workspace }}"

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            build/left/zephyr/zmk.uf2
            build/right/zephyr/zmk.uf2

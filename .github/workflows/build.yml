name: Build ZMK Firmware
on:
  push:
    branches:
      - main
      - ModernCode
  pull_request:
    branches:
      - main
      - ModernCode
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Left Side
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install West
        run: pip install west

      - name: Initialize Workspace
        run: |
          # Wir initialisieren West ganz normal
          west init -l config
          # Wir holen die Module
          west update
          west zephyr-export
          
      - name: Force Zephyr 3.5 (Downgrade)
        run: |
          # Wir erzwingen Version 3.5.0, die den fehlerhaften Validator nicht hat
          cd zephyr
          git fetch origin v3.5.0+zmk-fixes
          git checkout FETCH_HEAD
          cd ..
          # Module nach dem Wechsel synchronisieren
          west update

      - name: West Build
        run: |
          # Da wir jetzt auf 3.5.0 sind, können wir deinen originalen boards-Ordner nutzen
          # Der Validator von 4.1.0 wird uns nicht mehr stören
          west build -p always -s zmk/app -d "/tmp/tmp.left" -b "sofle_choc_pro_left" -- \
          -DZMK_CONFIG="${{ github.workspace }}/config" \
          -DBOARD_ROOT="${{ github.workspace }}"

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: /tmp/tmp.left/zephyr/zmk.uf2

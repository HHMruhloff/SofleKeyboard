Dieser Fehler ist unter Zephyr 4.1.0 extrem heimtückisch. Die Meldung Key 'build' was not defined. Path: '' bedeutet bei dieser spezifischen Zephyr-Version oft nicht, dass der Inhalt fehlt, sondern dass der Dateiname oder die Ordnerstruktur nicht zum neuen Hardware Model V2 passt.

In Zephyr 4.1.0 sucht das System nach einer Datei namens board.yml in einem Ordner, der exakt wie das Board heißt. Wenn du aber zusätzlich noch eine alte sofle_choc_pro_left.yaml oder Fragmente im Ordner hast, kollidiert der neue Validator.

Hier ist der finale, radikal bereinigte Code. Wir ändern die Strategie: Wir erstellen einen komplett frischen Board-Ordner außerhalb der bisherigen Pfade, um sicherzustellen, dass keine alten Dateien (die du vielleicht eingecheckt hast) die Validierung stören.

YAML
name: Build ZMK Firmware
on:
  push:
    branches: [ main, ModernCode ]
  pull_request:
    branches: [ main, ModernCode ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Left Side
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install West
        run: pip install west

      - name: Initialize Workspace
        run: |
          west init -l config
          west update
          west zephyr-export
          # Cache im Runner löschen
          rm -rf ~/.cache/zephyr

      - name: Create Isolated Board Directory
        run: |
          # Wir löschen den alten Ordner komplett, falls er existiert
          rm -rf build_boards/
          mkdir -p build_boards/arm/sofle_choc_pro_left/
          
          # Wir schreiben die board.yml mit absolutem Fokus auf Zephyr 4.1 V2
          # KEINE Leerzeichen am Zeilenende, KEINE Tabs.
          printf "board:\n" > build_boards/arm/sofle_choc_pro_left/board.yml
          printf "  name: sofle_choc_pro_left\n" >> build_boards/arm/sofle_choc_pro_left/board.yml
          printf "  vendor: custom\n" >> build_boards/arm/sofle_choc_pro_left/board.yml
          printf "build:\n" >> build_boards/arm/sofle_choc_pro_left/board.yml
          printf "  soc: nrf52840_qiaa\n" >> build_boards/arm/sofle_choc_pro_left/board.yml
          
          # WICHTIG: Kopiere die restlichen notwendigen Dateien (Shields etc.) 
          # in den neuen isolierten Ordner, falls sie im Repo unter boards/ liegen
          cp boards/sofle_choc_pro_left/* build_boards/arm/sofle_choc_pro_left/ 2>/dev/null || true
          # Lösche eine eventuell vorhandene alte .yaml Datei im Zielordner, 
          # da Zephyr 4.1 NUR die board.yml sehen will
          rm -f build_boards/arm/sofle_choc_pro_left/sofle_choc_pro_left.yaml

      - name: West Build
        run: |
          # Wir setzen BOARD_ROOT auf unseren neuen, isolierten Ordner
          west build -p always -s zmk/app -d "/tmp/tmp.left" -b "sofle_choc_pro_left" -- \
          -DZMK_CONFIG="${{ github.workspace }}/config" \
          -DBOARD_ROOT="${{ github.workspace }}/build_boards"

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: /tmp/tmp.left/zephyr/zmk.uf2
Warum das den Fehler beheben sollte:
Isolation: Durch build_boards/arm/ simulieren wir die Struktur, die Zephyr 4.1 erwartet, ohne dass "Leichen" aus deinem boards/-Ordner im Repository (wie alte .yaml oder .dts Dateien mit falschen Namen) den Validator triggern.

Dateinamens-Konflikt: Zephyr 4.1 wirft genau diesen Key 'build' was not defined Fehler, wenn es eine Datei findet, die es für eine Board-Beschreibung hält, die aber nicht dem V2-Standard entspricht.

Pfad-Eindeutigkeit: Wir geben -DBOARD_ROOT nun exakt auf diesen neuen Unterordner.

Was du jetzt tun musst:

Code in die build.yml kopieren.

In GitHub: Actions -> Caches -> Alle löschen. (Das ist zwingend, da CMake den Fehler sonst "auswendig lernt").

Push und Daumen drücken.

Wenn das fehlschlägt, ist die einzige Lösung, die west.yml in deinem config-Ordner so zu ändern, dass sie nicht mehr main von Zephyr zieht, sondern einen festen Commit-Stand (Revision) von vor dem 4.1-Release. Aber probieren wir erst diese saubere Isolation.


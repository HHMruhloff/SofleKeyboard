Hier ist der komplette, bereinigte Workflow. Ich habe das Erzeugen der board.yml so angepasst, dass sie ein vollständiges V2-Schema nutzt, inklusive einer Revision.

YAML
name: Build ZMK Firmware
on:
  push:
    branches: [ main, ModernCode ]
  pull_request:
    branches: [ main, ModernCode ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Left Side
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:

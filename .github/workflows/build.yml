Zephyr sieht die Datei, aber der YAML-Parser behauptet, build fehle auf der obersten Ebene. Bei Zephyr 4.x passiert das oft, wenn das System versucht, eine Hardware-V2-Datei nach dem alten V1-Schema zu validieren (oder umgekehrt).

Lass uns die build.yml (Workflow) so umbauen, dass wir die Board-V2-Struktur erzwingen und gleichzeitig sicherstellen, dass keine "Leichen" im Repository den Build stören.

Hier ist die komplette, bereinigte build.yml:

YAML
name: Build ZMK Firmware
on:

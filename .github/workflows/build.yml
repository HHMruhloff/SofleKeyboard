name: Build ZMK firmware
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@v0.3
    with:
      # Wir bauen hier direkt ohne externe build.yaml
      board: sofle_choc_pro_left
      shield: nice_view_disp
      # Falls du Studio brauchst:
      snippet: studio-rpc-usb-uart
      # Hier sagen wir ihm explizit, wo deine Board-Dateien liegen
      cmake_args: -DZMK_EXTRA_MODULES="${{ github.workspace }}"
